<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>今日の一語</title>

<link href="https://fonts.googleapis.com/css2?family=Yomogi&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #fff;
  color: #000;
  font-family: 'Yomogi', cursive;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* 日付＋時刻 */
.header {
  position: absolute;
  top: 20px;
  width: 90%;
  max-width: 420px;
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  opacity: 0.7;
}

/* コンテナ */
.container {
  text-align: center;
  width: 90%;
  max-width: 420px;
}

/* キーワード */
.keyword {
  font-size: 42px;
  opacity: 0;
  transform: scale(1.2);
}

/* 中央でふわっと表示 */
.keyword.show {
  animation: fadeInCenter 1.5s ease forwards;
}

@keyframes fadeInCenter {
  0% {
    opacity: 0;
    transform: scale(1.4);
    filter: blur(6px);
  }
  100% {
    opacity: 1;
    transform: scale(1);
    filter: blur(0);
  }
}

/* 解説（中央より下） */
.description {
  margin-top: 40px;
  font-size: 16px;
  line-height: 2;
  opacity: 0;
}

/* 解説フェード */
.description.show {
  animation: fadeInDesc 2s ease forwards;
  animation-delay: 0.5s;
}

@keyframes fadeInDesc {
  from {
    opacity: 0;
    transform: translateY(20px);
    filter: blur(4px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
    filter: blur(0);
  }
}

/* ヒント */
.hint {
  position: absolute;
  bottom: 30px;
  font-size: 12px;
  opacity: 0.4;
}
</style>
</head>

<body>

<div class="header">
  <div id="date"></div>
  <div id="time"></div>
</div>

<div class="container" onclick="showContent()">
  <div id="keyword" class="keyword"></div>
  <div id="description" class="description"></div>
</div>

<div class="hint">タップで更新</div>

<script>
// データ
const data = [
  {
    keyword: "おまけつきタンポポ",
    description: "綿毛の根元に「大吉」って書いてあったら嬉しいよね"
  },
  {
    keyword: "存在論",
    description: "存在とは何かを問う哲学の分野。"
  },
  {
    keyword: "死別",
    description: "不可逆的な分離。喪失によって意味が生まれる。"
  }
];

// 日付と時刻
function updateDateTime() {
  const now = new Date();

  const yyyy = now.getFullYear();
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');

  const hh = String(now.getHours()).padStart(2, '0');
  const min = String(now.getMinutes()).padStart(2, '0');
  const ss = String(now.getSeconds()).padStart(2, '0');

  document.getElementById("date").textContent = `${yyyy}/${mm}/${dd}`;
  document.getElementById("time").textContent = `${hh}:${min}:${ss}`;
}

setInterval(updateDateTime, 1000);
updateDateTime();

// 表示処理
function showContent() {
  const k = document.getElementById("keyword");
  const d = document.getElementById("description");

  k.classList.remove("show");
  d.classList.remove("show");

  void k.offsetWidth;

  const item = data[Math.floor(Math.random() * data.length)];

  k.textContent = item.keyword;
  d.textContent = item.description;

  k.classList.add("show");
  d.classList.add("show");
}

// 初回表示
showContent();
</script>

</body>
</html>
